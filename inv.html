<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
    emailjs.init("Ciq5jksQ03rzuzs5a");
})();
</script>

<title>Date Invitation</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
}

.envelope{
    position:relative;
    width:460px;
    height:300px;
    background:#e63946;
    border-radius:10px;
    cursor:pointer;
}

.flap{
    position:absolute;
    border-left:230px solid transparent;
    border-right:230px solid transparent;
    border-top:150px solid #c82333;
    width:0;
    height:0;
    top:0;
    transform-origin:top;
    transition:.6s;
}

.name{
    position:absolute;
    bottom:18px;
    right:20px;
    color:white;
    font-size:18px;
}

.open .flap{
    transform:rotateX(180deg);
}

.letter{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) translateY(-200%);
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    opacity:0;
    transition:.6s;
}

.open .letter{
    transform:translate(-50%,-50%);
    opacity:1;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.yes{background:#2ecc71;color:white;}
.no{background:#555;color:white;}

.choices{display:none;}
</style>
</head>

<body>

<div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="name">To: Zuzia<br>From: Grześ</div>
    <div class="letter" id="letter">
        <h2>Date invitation</h2>
        <p>Wydajesz się mega sympatyczna, może chciałabyś na weekendzie lub jakoś niedługo gdzieś wyskoczyć? ❣️</p>

        <button onclick="showChoices(event)">Odpowiedz</button>

        <div class="choices" id="choices">
            <button class="no" onclick="noAnswer(event)">Nie</button>
            <button class="yes" onclick="yesAnswer(event)">Tak</button>

        </div>
    </div>
</div>

<script>
function openEnvelope(){
    document.getElementById("env").classList.add("open");
}

function showChoices(e){
    e.stopPropagation();
    document.getElementById("choices").style.display="block";
}

function yesAnswer(e){
    e.stopPropagation();
    sendAnswer("TAK");
}

function noAnswer(e){
    e.stopPropagation();
    sendAnswer("NIE");
}

function sendAnswer(answer){

    const time = new Date().toLocaleString();

    emailjs.send("service_tirco4i", "template_nw159qu", {
        answer: answer,
        time: time
    })
    .then(function() {
        alert("Wysłano odpowiedź 💌");
    })
    .catch(function(error) {
        alert("Błąd: " + JSON.stringify(error));
        console.log(error);
    });
}
</script>

</body>
</html>
